<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  {%- seo -%}
  {%- if page.url contains '/en/' -%}
    {%- assign alt_ja = page.url | replace_first: '/en/', '/ja/' -%}
    <link rel="alternate" hreflang="en" href="{{ page.url | absolute_url }}" />
    <link rel="alternate" hreflang="ja" href="{{ alt_ja | absolute_url }}" />
    <link rel="alternate" hreflang="x-default" href="{{ page.url | absolute_url }}" />
  {%- elsif page.url contains '/ja/' -%}
    {%- assign alt_en = page.url | replace_first: '/ja/', '/en/' -%}
    <link rel="alternate" hreflang="ja" href="{{ page.url | absolute_url }}" />
    <link rel="alternate" hreflang="en" href="{{ alt_en | absolute_url }}" />
    <link rel="alternate" hreflang="x-default" href="{{ alt_en | absolute_url }}" />
  {%- endif -%}
  <link rel="stylesheet" href="{{ "/assets/main.css" | relative_url }}">
  {%- feed_meta -%}
</head>
